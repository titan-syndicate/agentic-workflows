<!--
  Theme handling, injected at the END of <head> (after the theme stylesheet link, before
  <body> paints) so we can set the scheme with NO flash of the wrong theme.

  Why not just use Just-the-Docs' jtd.setTheme()? On a project site served under a baseurl
  (here: /agentic-workflows/), its built-in swap points at /assets/css/... without the
  baseurl prefix → 404 → the toggle appears to "do nothing". We swap the stylesheet href
  ourselves using the correct baseurl, so it works on subpath sites.

  Default: follow the visitor's OS `prefers-color-scheme`, live-updating on change.
  The nav-footer button is a manual override that sticks (localStorage).
-->
<script>
  (function () {
    var BASE = "{{ '/assets/css/' | relative_url }}"; // e.g. /agentic-workflows/assets/css/
    var KEY = "jtd-theme-override";
    var mq = window.matchMedia("(prefers-color-scheme: dark)");

    // The main scheme stylesheet (NOT the head-nav helper sheet).
    function link() {
      return document.querySelector(
        'link[rel="stylesheet"]:not(#jtd-head-nav-stylesheet)[href*="just-the-docs-"]'
      );
    }
    function current() {
      var l = link();
      if (!l) return "light";
      var m = l.getAttribute("href").match(/just-the-docs-([a-z]+)\.css/);
      return (m && m[1] === "dark") ? "dark" : "light";
    }
    function apply(theme) {
      var l = link();
      if (l) l.setAttribute("href", BASE + "just-the-docs-" + theme + ".css");
    }
    function systemTheme() { return mq.matches ? "dark" : "light"; }
    function override() {
      var o = localStorage.getItem(KEY);
      return (o === "dark" || o === "light") ? o : null;
    }

    // Apply ASAP, before <body> paints — the <link> above us is already parsed.
    apply(override() || systemTheme());

    // Wire the toggle button once the footer has rendered.
    window.addEventListener("DOMContentLoaded", function () {
      var btn = document.querySelector(".js-toggle-theme");
      function label() {
        if (btn) btn.textContent = current() === "dark" ? "☀️ Light mode" : "🌙 Dark mode";
      }
      if (btn) {
        label();
        btn.addEventListener("click", function () {
          var next = current() === "dark" ? "light" : "dark";
          apply(next);
          localStorage.setItem(KEY, next); // sticky override
          label();
        });
      }
      // Follow OS changes while there's no manual override.
      mq.addEventListener("change", function () {
        if (!override()) { apply(systemTheme()); label(); }
      });
    });
  })();
</script>
